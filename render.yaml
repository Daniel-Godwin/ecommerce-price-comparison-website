# Render.com blueprint — deploy via "New +" → "Blueprint" → point at this repo
services:
  - type: web
    name: price-comparison-api
    runtime: docker
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pricecompare-db
          property: connectionString
      - key: VECTOR_INDEX_DIR
        value: /tmp/vector_index      # free tier disk is ephemeral
      - key: LLM_DAILY_BUDGET_USD
        value: "2.00"
      - key: ENABLE_DEMO_ADAPTER
        value: "false"
      - key: ANTHROPIC_API_KEY
        sync: false                   # set manually in the Render dashboard

databases:
  - name: pricecompare-db
    plan: free

  # Public website (static React build). Set VITE_API_BASE in the dashboard
  # to your API URL, e.g. https://price-comparison-api-xxxx.onrender.com
  - type: web
    name: kasuwa-web
    runtime: static
    rootDir: frontend-web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        sync: false
